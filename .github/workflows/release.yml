name: CI / Build / Release

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    branches:
      - "**"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Ubuntu)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Build debug workspace
        run: cargo build --workspace --locked

      - name: Run Rust tests
        run: cargo test --workspace --locked

      - name: Run Plix dual-mode verification battery
        run: bash tests/run_all.sh ./target/debug/plix

      - name: Run deterministic interpreter/native fuzz parity
        run: bash tests/fuzz_parity.sh 40 ./target/debug/plix

  package:
    name: Package ${{ matrix.name }}
    needs: test
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-22.04
            suffix: x86_64-unknown-linux-gnu
            binary: target/release/plix
            exe: plix
            archive: tar.gz

          - name: Windows x86_64
            os: windows-2022
            suffix: x86_64-pc-windows-msvc
            binary: target/release/plix.exe
            exe: plix.exe
            archive: zip

          - name: macOS
            os: macos-latest
            suffix: apple-darwin
            binary: target/release/plix
            exe: plix
            archive: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Smoke test release binary
        run: ${{ matrix.binary }} --version
        shell: bash

      - name: Package Unix artifact
        if: runner.os != 'Windows'
        id: package_unix
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(awk -F '"' '/^version =/ { print $2; exit }' Cargo.toml)
          SUFFIX="${{ matrix.suffix }}"
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            SUFFIX="$(uname -m)-${SUFFIX}"
          fi

          PKG="plix-${VERSION}-${SUFFIX}"
          mkdir -p "dist/${PKG}/bin" "dist/${PKG}/tests"
          cp "${{ matrix.binary }}" "dist/${PKG}/bin/${{ matrix.exe }}"
          cp README.md LICENSE "dist/${PKG}/"
          cp -R docs examples "dist/${PKG}/"
          cp tests/run_all.sh tests/fuzz_parity.sh tests/fuzz_gen.px tests/core_test.px "dist/${PKG}/tests/"

          tar -czf "dist/${PKG}.tar.gz" -C dist "${PKG}"
          echo "artifact_name=${PKG}" >> "$GITHUB_OUTPUT"
          echo "archive_path=dist/${PKG}.tar.gz" >> "$GITHUB_OUTPUT"

      # Plix's native compiler depends on Cranelift, which currently has no
      # i686 host backend. Do not label the x86_64 binary as an i386 package;
      # add i386 only after an interpreter-only build feature exists.
      - name: Build Debian amd64 package
        if: runner.os == 'Linux'
        id: package_debian
        shell: bash
        run: |
          set -euo pipefail

          VERSION=$(awk -F '"' '/^version =/ { print $2; exit }' Cargo.toml)
          # Debian sorts pre-release versions correctly when '-' becomes '~'.
          DEB_VERSION="${VERSION//-/~}"
          DEB_ARCH="amd64"
          PACKAGE_ROOT="dist/debian/plix_${DEB_VERSION}_${DEB_ARCH}"

          mkdir -p "${PACKAGE_ROOT}/DEBIAN"
          mkdir -p "${PACKAGE_ROOT}/usr/bin"
          mkdir -p "${PACKAGE_ROOT}/usr/share/doc/plix"
          mkdir -p "${PACKAGE_ROOT}/usr/share/metainfo"

          install -Dm755 \
            "${{ matrix.binary }}" \
            "${PACKAGE_ROOT}/usr/bin/plix"

          install -Dm644 README.md \
            "${PACKAGE_ROOT}/usr/share/doc/plix/README.md"
          install -Dm644 LICENSE \
            "${PACKAGE_ROOT}/usr/share/doc/plix/copyright"

          for SIZE in 48 64 128 256 512; do
            install -Dm644 \
              "assets/linux/icons/plix-${SIZE}.png" \
              "${PACKAGE_ROOT}/usr/share/icons/hicolor/${SIZE}x${SIZE}/apps/plix.png"
          done

          install -Dm644 \
            assets/linux/io.github.plixlang.plix.metainfo.xml \
            "${PACKAGE_ROOT}/usr/share/metainfo/io.github.plixlang.plix.metainfo.xml"

          INSTALLED_SIZE=$(du -sk "${PACKAGE_ROOT}" | cut -f1)

          cat > "${PACKAGE_ROOT}/DEBIAN/control" <<EOF
          Package: plix
          Version: ${DEB_VERSION}
          Section: devel
          Priority: optional
          Architecture: ${DEB_ARCH}
          Installed-Size: ${INSTALLED_SIZE}
          Maintainer: Plix Team <plixlang@users.noreply.github.com>
          Depends: libc6 (>= 2.35), libgcc-s1, gcc
          Homepage: https://github.com/plixlang/plix
          Description: Plix programming language
           A fast, safe and gradually typed programming language with an
           interpreter and a native Cranelift compiler.
          EOF

          DEB_PATH="dist/plix_${DEB_VERSION}_${DEB_ARCH}.deb"
          dpkg-deb --build --root-owner-group "${PACKAGE_ROOT}" "${DEB_PATH}"
          dpkg-deb --info "${DEB_PATH}"
          dpkg-deb --contents "${DEB_PATH}"

          echo "artifact_name=plix-${VERSION}-${DEB_ARCH}-deb" >> "$GITHUB_OUTPUT"
          echo "package_path=${DEB_PATH}" >> "$GITHUB_OUTPUT"

      - name: Test Debian amd64 package
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo dpkg -i "${{ steps.package_debian.outputs.package_path }}"
          /usr/bin/plix --version
          dpkg-query --show --showformat='${Package} ${Version} ${Architecture}\n' plix

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        id: package_windows
        shell: pwsh
        run: |
          $versionLine = Select-String -Path Cargo.toml -Pattern '^version = "([^\"]+)"' | Select-Object -First 1
          $version = $versionLine.Matches[0].Groups[1].Value
          $pkg = "plix-$version-${{ matrix.suffix }}"
          $pkgDir = "dist/$pkg"

          New-Item -ItemType Directory -Force -Path "$pkgDir/bin", "$pkgDir/tests" | Out-Null
          Copy-Item "${{ matrix.binary }}" "$pkgDir/bin/${{ matrix.exe }}"
          Copy-Item README.md, LICENSE -Destination $pkgDir
          Copy-Item docs, examples -Destination $pkgDir -Recurse
          Copy-Item tests/run_all.sh, tests/fuzz_parity.sh, tests/fuzz_gen.px, tests/core_test.px -Destination "$pkgDir/tests"

          Compress-Archive -Path $pkgDir -DestinationPath "dist/$pkg.zip" -Force
          "artifact_name=$pkg" >> $env:GITHUB_OUTPUT
          "archive_path=dist/$pkg.zip" >> $env:GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package_unix.outputs.artifact_name || steps.package_windows.outputs.artifact_name }}
          path: ${{ steps.package_unix.outputs.archive_path || steps.package_windows.outputs.archive_path }}
          if-no-files-found: error

      - name: Upload Debian amd64 artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package_debian.outputs.artifact_name }}
          path: ${{ steps.package_debian.outputs.package_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: plix-*
          merge-multiple: true
          path: release-assets

      - name: Show release assets
        run: find release-assets -type f -maxdepth 2 -print

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}

